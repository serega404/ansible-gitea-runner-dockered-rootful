---
- name: Check whether Docker is installed
  ansible.builtin.command:
    argv:
      - docker
      - --version
  register: gitea_runner_docker_version_check
  changed_when: false
  failed_when: false

- name: Set Docker presence fact
  ansible.builtin.set_fact:
    gitea_runner_docker_present: >-
      {{ gitea_runner_docker_version_check.rc == 0 }}

- name: Install Docker on Alpine
  ansible.builtin.include_tasks: install_alpine.yml
  when:
    - not gitea_runner_docker_present
    - ansible_facts.os_family == 'Alpine'

- name: Install Docker with official convenience script
  ansible.builtin.include_tasks: install_official.yml
  when:
    - not gitea_runner_docker_present
    - ansible_facts.os_family != 'Alpine'

- name: Ensure Docker service is enabled and started
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started
  when: gitea_runner_manage_docker_service | bool
