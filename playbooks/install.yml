---
- name: Install Gitea Runner
  hosts: gitea_runners
  become: true
  gather_facts: false

  vars_prompt:
    - name: gitea_runner_install_name
      prompt: Runner name and /srv directory postfix
      private: false
      default: main

    - name: gitea_runner_version_input
      prompt: Gitea runner version
      private: false
      default: "2.0"

    - name: gitea_runner_instance_url
      prompt: Gitea instance URL
      private: false

    - name: gitea_runner_registration_token
      prompt: Gitea runner registration token
      private: true

  pre_tasks:
    - name: Bootstrap Python for Ansible
      ansible.builtin.raw: |
        if command -v python3 >/dev/null 2>&1; then
          exit 0
        elif command -v apk >/dev/null 2>&1; then
          apk add --no-cache python3
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y python3
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y python3
        elif command -v yum >/dev/null 2>&1; then
          yum install -y python3
        else
          echo "No supported package manager found for Python bootstrap" >&2
          exit 1
        fi
      changed_when: false

    - name: Gather facts
      ansible.builtin.setup:

    - name: Prepare prompted runner settings
      ansible.builtin.set_fact:
        gitea_runner_install_postfix: >-
          {{
            gitea_runner_install_name
            | trim
            | lower
            | regex_replace('[^a-z0-9_.-]+', '_')
            | regex_replace('^_+|_+$', '')
          }}
        gitea_runner_version: >-
          {{
            gitea_runner_version_input
            | trim
            | regex_replace('^v', '')
          }}

    - name: Validate prompted runner name
      ansible.builtin.assert:
        that:
          - gitea_runner_install_postfix | length > 0
        fail_msg: >-
          Runner name must contain at least one letter, number, dot, underscore,
          or dash after normalization.

    - name: Normalize runner version alias
      ansible.builtin.set_fact:
        gitea_runner_image_version: >-
          {{
            '2.0.0'
            if gitea_runner_version == '2.0'
            else gitea_runner_version
          }}

    - name: Prepare role variables from prompts
      ansible.builtin.set_fact:
        gitea_runner_name: "{{ gitea_runner_install_name | trim }}"
        gitea_runner_dir: "/srv/gitea_runner_{{ gitea_runner_install_postfix }}"
        gitea_runner_image: >-
          docker.io/gitea/runner:{{ gitea_runner_image_version }}
        gitea_runner_compose_project_name: >-
          gitea_runner_{{ gitea_runner_install_postfix }}
        gitea_runner_container_name: >-
          gitea_runner_{{ gitea_runner_install_postfix }}

  roles:
    - role: ansible-gitea-runner-dockered-rootful
