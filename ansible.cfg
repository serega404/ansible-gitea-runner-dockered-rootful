[defaults]
# Keep the role runnable from this repository root without extra CLI flags.
roles_path = ..
inventory = inventory.yml

# Use /tmp so Ansible does not depend on a writable home directory/cache.
local_tmp = /tmp/ansible-local
remote_tmp = /tmp/ansible-remote
interpreter_python = auto_silent

# Convenient for disposable local VMs.
# host_key_checking = False