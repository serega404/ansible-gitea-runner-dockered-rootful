---
gitea_runner_dir: /srv/gitea_runner
gitea_runner_image: docker.io/gitea/runner:2.0.0

gitea_runner_instance_url: ""
gitea_runner_registration_token: ""
gitea_runner_name: "{{ inventory_hostname }}"
gitea_runner_labels:
  - ubuntu-latest:docker://catthehacker/ubuntu:act-latest
  - ubuntu-24.04:docker://catthehacker/ubuntu:act-24.04
  - ubuntu-22.04:docker://catthehacker/ubuntu:act-22.04

gitea_runner_install_docker: true
gitea_runner_manage_docker_service: true
gitea_runner_manage_compose: true
gitea_runner_docker_socket: /var/run/docker.sock
gitea_runner_compose_project_name: gitea_runner
gitea_runner_container_name: gitea_runner
gitea_runner_restart_policy: unless-stopped

gitea_runner_cache_enabled: false
gitea_runner_cache_host: ""
gitea_runner_cache_port: 8088
gitea_runner_cache_dir: ""

gitea_runner_config: {}
gitea_runner_config_raw: ""
gitea_runner_environment_extra: {}

gitea_runner_log_level: info
gitea_runner_capacity: 1
gitea_runner_job_timeout: 3h
gitea_runner_fetch_timeout: 5s
gitea_runner_fetch_interval: 2s
gitea_runner_insecure: false
gitea_runner_envs: {}
gitea_runner_container_network: ""
gitea_runner_container_privileged: false
gitea_runner_container_options: ""
gitea_runner_container_workdir_parent: ""
gitea_runner_container_valid_volumes: []
gitea_runner_host_workdir_parent: ""
